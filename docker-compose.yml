version: '3.8'

services:
  app:
    build: .
    container_name: nexus-support-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/nexus-support
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_REPO_OWNER=${GITHUB_REPO_OWNER}
      - GITHUB_REPO_NAME=${GITHUB_REPO_NAME}
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nexus-network

  mongodb:
    image: mongo:6.0
    container_name: nexus-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=nexus-support
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nexus-network

volumes:
  mongodb-data:
    driver: local

networks:
  nexus-network:
    driver: bridge
