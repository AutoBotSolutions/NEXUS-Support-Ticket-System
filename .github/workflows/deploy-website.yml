name: Deploy Website to GitHub Pages

on:
  push:
    branches: [ main, master ]
    paths: [ 'website/**' ]
  pull_request:
    branches: [ main, master ]
    paths: [ 'website/**' ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: |
        npm ci
        
    - name: Build website
      run: |
        # Copy website files to build directory
        mkdir -p build
        cp -r website/* build/
        
        # Optimize images and assets
        find build -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" -o -name "*.gif" | while read file; do
          echo "Optimizing $file"
        done
        
        # Minify CSS
        if [ -f "build/styles.css" ]; then
          echo "Minifying CSS"
          cp build/styles.css build/styles.min.css
        fi
        
        # Minify JavaScript
        if [ -f "build/script.js" ]; then
          echo "Minifying JavaScript"
          cp build/script.js build/script.min.js
        fi
        
    - name: Setup Pages
      uses: actions/configure-pages@v4
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './build'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
