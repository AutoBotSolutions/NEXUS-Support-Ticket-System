<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS Support System - Authentication</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;s
            backdrop-filter: blur(10px);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .auth-header p {
            color: #666;
            font-size: 16px;
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-radius: 10px;
            overflow: hidden;
            background: #f0f0f0;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            background: transparent;
            border: none;
            font-size: 16px;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
        }

        .tab.active {
            background: #667eea;
            color: white;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .user-info {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        .user-info h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .user-details {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: left;
        }

        .user-details p {
            margin-bottom: 10px;
            color: #555;
        }

        .user-details strong {
            color: #333;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .btn-success {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }
    </style>
</head>
<body>
    <!-- Authentication Panel -->
    <div id="authPanel" class="auth-container">
        <div class="auth-header">
            <h1>NEXUS Support System</h1>
            <p>Manage your support tickets with ease</p>
        </div>

        <div id="message"></div>

        <div class="tabs">
            <button class="tab active" onclick="showTab('login', this)">Login</button>
            <button class="tab" onclick="showTab('register', this)">Register</button>
        </div>

        <!-- Login Panel -->
        <div id="loginPanel" class="panel active">
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" required placeholder="Enter your password">
                </div>
                <button type="submit" id="loginBtn">Login</button>
            </form>
        </div>

        <!-- Register Panel -->
        <div id="registerPanel" class="panel">
            <form id="registerForm">
                <div class="form-group">
                    <label for="registerUsername">Username</label>
                    <input type="text" id="registerUsername" required placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label for="registerEmail">Email</label>
                    <input type="email" id="registerEmail" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label for="registerFullName">Full Name</label>
                    <input type="text" id="registerFullName" required placeholder="Your full name">
                </div>
                <div class="form-group">
                    <label for="registerPassword">Password</label>
                    <input type="password" id="registerPassword" required placeholder="Create a password">
                </div>
                <button type="submit" id="registerBtn">Register</button>
            </form>
        </div>
    </div>

    <!-- User Dashboard Panel -->
    <div id="dashboardPanel" class="user-info" style="display: none;">
        <h2>Welcome to NEXUS!</h2>
        <div class="user-details">
            <p><strong>Username:</strong> <span id="userUsername"></span></p>
            <p><strong>Email:</strong> <span id="userEmail"></span></p>
            <p><strong>Full Name:</strong> <span id="userFullName"></span></p>
            <p><strong>Account Status:</strong> <span id="userStatus" style="color: #28a745;">Active</span></p>
        </div>
        
        <div class="action-buttons">
            <button class="btn-primary" onclick="goToTicketSystem()">🎫 Manage Tickets</button>
            <button class="btn-success" onclick="goToMonitoring()">📊 View Monitoring</button>
            <button class="btn-secondary" onclick="logout()">🚪 Logout</button>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let authToken = localStorage.getItem('nexus_token');

        // Check if user is already logged in
        window.onload = () => {
            if (authToken) {
                verifyToken();
            }
        };

        async function verifyToken() {
            try {
                const response = await fetch(`${API_BASE}/users/profile`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    showDashboard(data.data.user);
                } else {
                    localStorage.removeItem('nexus_token');
                }
            } catch (error) {
                localStorage.removeItem('nexus_token');
            }
        }

        function showTab(tab, buttonElement) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            
            // Activate the clicked button
            if (buttonElement) {
                buttonElement.classList.add('active');
            }
            
            document.getElementById(tab + 'Panel').classList.add('active');
            
            clearMessage();
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = `<div class="message ${type}">${text}</div>`;
            
            setTimeout(() => {
                clearMessage();
            }, 5000);
        }

        function clearMessage() {
            document.getElementById('message').innerHTML = '';
        }

        function setLoading(buttonId, loading = true) {
            const button = document.getElementById(buttonId);
            if (loading) {
                button.innerHTML = '<span class="loading"></span>Processing...';
                button.disabled = true;
            } else {
                button.innerHTML = buttonId === 'loginBtn' ? 'Login' : 'Register';
                button.disabled = false;
            }
        }

        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            setLoading('loginBtn', true);
            
            try {
                const response = await fetch(`${API_BASE}/users/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    console.log('Login successful, data:', data);
                    authToken = data.data.token;
                    localStorage.setItem('nexus_token', authToken);
                    showMessage('Login successful! Redirecting...', 'success');
                    
                    // Show dashboard immediately without timeout
                    console.log('About to show dashboard immediately');
                    showDashboard(data.data.user);
                } else {
                    console.log('Login failed:', data.error);
                    showMessage('Login failed: ' + data.error, 'error');
                }
            } catch (error) {
                showMessage('Network error: ' + error.message, 'error');
            } finally {
                setLoading('loginBtn', false);
            }
        });

        // Register form handler
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('registerUsername').value;
            const email = document.getElementById('registerEmail').value;
            const fullName = document.getElementById('registerFullName').value;
            const password = document.getElementById('registerPassword').value;
            
            setLoading('registerBtn', true);
            
            try {
                const response = await fetch(`${API_BASE}/users/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, email, fullName, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    authToken = data.data.token;
                    localStorage.setItem('nexus_token', authToken);
                    showMessage('Registration successful! Redirecting...', 'success');
                    
                    setTimeout(() => {
                        showDashboard(data.data.user);
                    }, 1500);
                } else {
                    showMessage('Registration failed: ' + data.error, 'error');
                }
            } catch (error) {
                showMessage('Network error: ' + error.message, 'error');
            } finally {
                setLoading('registerBtn', false);
            }
        });

        function showDashboard(user) {
            console.log('Showing dashboard for user:', user);
            
            // Hide auth panel and show dashboard
            document.getElementById('authPanel').style.display = 'none';
            document.getElementById('dashboardPanel').style.display = 'block';
            
            // Update user information
            document.getElementById('userUsername').textContent = user.username;
            document.getElementById('userEmail').textContent = user.email;
            document.getElementById('userFullName').textContent = user.fullName;
            
            console.log('Dashboard should now be visible');
        }

        function logout() {
            localStorage.removeItem('nexus_token');
            authToken = null;
            
            document.getElementById('authPanel').style.display = 'block';
            document.getElementById('dashboardPanel').style.display = 'none';
            
            // Reset forms
            document.getElementById('loginForm').reset();
            document.getElementById('registerForm').reset();
            
            showMessage('Logged out successfully', 'success');
        }

        function goToTicketSystem() {
            // Open ticket system in new tab with auth token
            const ticketUrl = `/ticket-system.html?token=${authToken}`;
            window.open(ticketUrl, '_blank');
        }

        function goToMonitoring() {
            // Open monitoring dashboard
            window.open('http://localhost:3002', '_blank');
        }
    </script>
</body>
</html>
