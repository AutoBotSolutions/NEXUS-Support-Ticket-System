input {
  beats {
    port => 5044
  }
  tcp {
    port => 5000
    codec => json_lines
  }
  file {
    path => "/var/log/nexus/*.log"
    start_position => "beginning"
    codec => json
  }
}

filter {
  # Parse JSON logs
  if [message] {
    json {
      source => "message"
      target => "parsed"
    }
  }

  # Add environment and service information
  mutate {
    add_field => { "[@metadata][service]" => "nexus-support-system" }
    add_field => { "[@metadata][environment]" => "production" }
  }

  # Parse timestamp
  if [parsed][timestamp] {
    date {
      match => [ "[parsed][timestamp]", "ISO8601" ]
      target => "@timestamp"
    }
  }

  # Categorize logs
  if [parsed][category] {
    mutate {
      add_field => { "[@metadata][category]" => "%{[parsed][category]}" }
    }
  }

  # Extract request ID for correlation
  if [parsed][requestId] {
    mutate {
      add_field => { "[@metadata][request_id]" => "%{[parsed][requestId]}" }
    }
  }

  # Handle error logs specifically
  if [parsed][level] == "error" {
    mutate {
      add_tag => [ "error" ]
    }
  }

  # Handle security logs specifically
  if [parsed][category] == "security" {
    mutate {
      add_tag => [ "security" ]
    }
  }

  # Clean up fields
  mutate {
    remove_field => [ "message", "parsed" ]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "nexus-logs-%{+YYYY.MM.dd}"
    template_name => "nexus-logs"
    template_pattern => "nexus-logs-*"
    template => {
      "index_patterns" => ["nexus-logs-*"],
      "settings" => {
        "number_of_shards" => 1,
        "number_of_replicas" => 0
      },
      "mappings" => {
        "properties" => {
          "@timestamp" => { "type" => "date" },
          "level" => { "type" => "keyword" },
          "category" => { "type" => "keyword" },
          "requestId" => { "type" => "keyword" },
          "ip" => { "type" => "ip" },
          "method" => { "type" => "keyword" },
          "url" => { "type" => "text" },
          "statusCode" => { "type" => "integer" },
          "duration" => { "type" => "float" },
          "userAgent" => { "type" => "text" },
          "environment" => { "type" => "keyword" },
          "service" => { "type" => "keyword" }
        }
      }
    }
  }
  
  # Debug output (remove in production)
  stdout {
    codec => rubydebug
  }
}
