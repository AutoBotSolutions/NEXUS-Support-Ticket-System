# GitHub Pages Configuration for NEXUS Support System

# Site settings
title: NEXUS Support System
description: Advanced Ticket Management with GitHub Integration
url: "https://autobotsolutions.github.io"
baseurl: "/NEXUS-Support-Ticket-System"
repository: AutoBotSolutions/NEXUS-Support-Ticket-System

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle
  - .gitignore
  - .DS_Store

# Navigation
nav:
  - title: Home
    url: /
  - title: Features
    url: /features.html
  - title: Documentation
    url: /docs.html
  - title: Contact
    url: /contact.html

# Social media
social:
  github: AutoBotSolutions/NEXUS-Support-Ticket-System
  twitter: nexus_support
